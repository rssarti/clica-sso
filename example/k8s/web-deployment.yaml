apiVersion: apps/v1
kind: Deployment
metadata:
  name: guindakila-web
  namespace: guindakila
  labels:
    app: guindakila-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guindakila-web
  template:
    metadata:
      labels:
        app: guindakila-web
    spec:
      containers:
        - name: web
          image: docker.io/sispsolutions/guindakila-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: guindakila-web-service
  namespace: guindakila
  labels:
    app: guindakila-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: guindakila-web
