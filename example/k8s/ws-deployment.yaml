apiVersion: apps/v1
kind: Deployment
metadata:
  name: guindakila-ws
  namespace: guindakila
  labels:
    app: guindakila-ws
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guindakila-ws
  template:
    metadata:
      labels:
        app: guindakila-ws
    spec:
      containers:
        - name: ws
          image: docker.io/sispsolutions/guindakila-ws:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: websocket
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: guindakila-ws-service
  namespace: guindakila
  labels:
    app: guindakila-ws
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: websocket
  selector:
    app: guindakila-ws
