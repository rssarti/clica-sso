apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clica-sso-ingress
  namespace: clica-sso
  annotations:
    # Traefik Ingress Controller annotations
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # Redirect HTTP to HTTPS
    traefik.ingress.kubernetes.io/redirect-entry-point: websecure
    traefik.ingress.kubernetes.io/redirect-permanent: "true"
    # Certificate management with cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.clicatecnologia.com.br
        - accounts.clicatecnologia.com.br
        - ws.clicatecnologia.com.br
      secretName: clica-sso-tls-cert
  rules:
    # Backend API
    - host: api.clicatecnologia.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clica-sso-backend-service
                port:
                  number: 3000

    # Frontend
    - host: accounts.clicatecnologia.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clica-sso-frontend-service
                port:
                  number: 80

    # WebSocket Server
    - host: ws.clicatecnologia.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clica-sso-websocket-service
                port:
                  number: 3000
