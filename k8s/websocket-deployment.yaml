apiVersion: apps/v1
kind: Deployment
metadata:
  name: clica-sso-websocket
  namespace: clica-sso
  labels:
    app: clica-sso-websocket
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: clica-sso-websocket
  template:
    metadata:
      labels:
        app: clica-sso-websocket
    spec:
      serviceAccountName: jenkins-deployer
      containers:
        - name: websocket
          image: docker.io/sispsolutions/clica-sso-websocket:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            # Database
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: clica-sso-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: clica-sso-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: clica-sso-config
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: clica-sso-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clica-sso-secrets
                  key: DB_PASSWORD

            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clica-sso-secrets
                  key: JWT_SECRET

            # General
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: clica-sso-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: clica-sso-config
                  key: LOG_LEVEL

          resources:
            requests:
              memory: "128Mi"
              cpu: "10m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: clica-sso-websocket-service
  namespace: clica-sso
  labels:
    app: clica-sso-websocket
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: clica-sso-websocket
