apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email for certificate renewal notifications
    email: devops@clicatecnologia.com.br
    # Name of secret for account private key
    privateKeySecretRef:
      name: letsencrypt-prod
    # Solve challenges using HTTP-01 (requires Traefik HTTP exposure)
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
