apiVersion: apps/v1
kind: Deployment
metadata:
  name: clica-sso-frontend
  namespace: clica-sso
  labels:
    app: clica-sso-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: clica-sso-frontend
  template:
    metadata:
      labels:
        app: clica-sso-frontend
    spec:
      serviceAccountName: jenkins-deployer
      containers:
        - name: frontend
          image: docker.io/${DOCKER_USERNAME}/clica-sso-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: clica-sso-config
                  key: VITE_API_URL
            - name: VITE_SOCKET_IO
              valueFrom:
                configMapKeyRef:
                  name: clica-sso-config
                  key: VITE_SOCKET_IO
            - name: VITE_SOCKET_PATCH
              valueFrom:
                configMapKeyRef:
                  name: clica-sso-config
                  key: VITE_SOCKET_PATCH

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: clica-sso-frontend-service
  namespace: clica-sso
  labels:
    app: clica-sso-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: clica-sso-frontend
