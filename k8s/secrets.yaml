# ===== SECRETS TEMPLATE =====
# Este arquivo é apenas uma REFERÊNCIA/DOCUMENTAÇÃO
# Os secrets reais serão criados pelo Jenkins a partir do arquivo .env-file
# 
# Nunca comita este arquivo com valores reais!
# Use Jenkins > Credentials > Secret File para gerenciar

apiVersion: v1
kind: Secret
metadata:
  name: clica-sso-secrets
  namespace: clica-sso
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://user:password@host:5432/clica_sso"
  DB_USER: "postgres"
  DB_PASSWORD: "postgres_password"

  # JWT
  JWT_SECRET: "sua-chave-jwt-super-secreta-aqui"

  # RabbitMQ
  RABBITMQ_URL: "amqp://admin:admin123@rabbitmq-host:5672/"
  RABBITMQ_USER: "admin"
  RABBITMQ_PASSWORD: "admin123"

  # S3/DigitalOcean Spaces (se aplicável)
  S3_ACCESS_KEY: "your-do-access-key"
  S3_SECRET_KEY: "your-do-secret-key"
  S3_ENDPOINT: "https://sfo3.digitaloceanspaces.com"
  S3_REGION: "us-east-1"
  S3_BUCKET: "seu-bucket"
