apiVersion: v1
kind: ConfigMap
metadata:
  name: clica-sso-front-config
  namespace: default
data:
  # Configurações da aplicação
  VITE_API_URL: "https://api.clicatecnologia.com.br"
  VITE_SSO_URL: "https://accounts.clicatecnologia.com.br"
  VITE_SOCKET_IO: "https://socket.clicatecnologia.com.br"
  VITE_SOCKET_PATCH: "/socket.io/"
  
  # Configurações do Nginx (opcional)
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        root /usr/share/nginx/html;
        index index.html;
        
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        location /health {
            access_log off;
            default_type text/plain;
            return 200 'healthy';
        }
    }