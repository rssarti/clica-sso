# ===== DOCKER COMPOSE PARA CLICA SSO FRONTEND =====
version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: clica-sso-frontend:latest
    container_name: clica-sso-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:${PORT:-80}"
    environment:
      # Configurações do servidor
      - PORT=${PORT:-80}

      # URLs da aplicação
      - VITE_API_URL=${VITE_API_URL:-/api}
      - VITE_SSO_URL=${VITE_SSO_URL:-https://accounts.clicatecnologia.com.br}
      - VITE_SOCKET_IO=${VITE_SOCKET_IO:-https://accounts.clicatecnologia.com.br}
      - VITE_SOCKET_PATCH=${VITE_SOCKET_PATCH:-/socket.io/}

      # URL do backend para proxy
      - BACKEND_URL=${BACKEND_URL:-http://backend:3000}

    volumes:
      # Para logs persistentes
      - ./logs:/var/log/nginx

    networks:
      - clica-sso-network

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${PORT:-80}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`accounts.clicatecnologia.com.br`)"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=${PORT:-80}"

  # Opcional: Nginx como reverse proxy adicional
  nginx-proxy:
    image: nginx:alpine
    container_name: clica-sso-nginx-proxy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs:/var/log/nginx
    depends_on:
      - frontend
    networks:
      - clica-sso-network
    restart: unless-stopped
    profiles:
      - proxy

networks:
  clica-sso-network:
    driver: bridge
    name: clica-sso-network

volumes:
  nginx-logs:
    driver: local
