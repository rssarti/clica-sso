apiVersion: apps/v1
kind: Deployment
metadata:
  name: clica-sso-backend
  namespace: default
  labels:
    app: clica-sso-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clica-sso-backend
  template:
    metadata:
      labels:
        app: clica-sso-backend
        tier: backend
    spec:
      containers:
      - name: clica-sso-backend
        image: sispsolutions/clica-sso-backend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        # Database Configuration (from Secrets)
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: db-host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: db-port
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: db-password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: db-name
        - name: DB_SSL
          value: "true"
        - name: PGSSLMODE
          value: "require"
        - name: DB_CA_CERTIFICATE
          value: "/etc/ssl/certs/ca.crt"
        # JWT
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: jwt-secret
        # Redis
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: redis-url
        # MinIO / S3 (DigitalOcean Spaces)
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: minio-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: minio-secret-key
        - name: S3_ENDPOINT
          value: "https://nyc3.digitaloceanspaces.com"
        - name: S3_REGION
          value: "nyc3"
        - name: S3_BUCKET_NAME
          value: "clica-sso-storage"
        # Banco Inter
        - name: BANCO_INTER_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: inter-client-id
        - name: BANCO_INTER_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: clica-sso-secrets
              key: inter-client-secret
        - name: BANCO_INTER_BASE_URL
          value: "https://cdpj.partners.bancointer.com.br"
        - name: BANCO_INTER_SCOPE
          value: "rec.read rec.write cob.write cob.read payloadlocationrec.write boleto-cobranca.read boleto-cobranca.write"
        - name: BANCO_INTER_CERT_PATH
          value: "/etc/banco-inter-cert/cert.crt"
        - name: BANCO_INTER_KEY_PATH
          value: "/etc/banco-inter-cert/cert.key"
        # CORS
        - name: CORS_ORIGIN
          value: "https://accounts.clicatecnologia.com.br"
        - name: API_URL
          value: "https://api.clicatecnologia.com.br"
        # RabbitMQ (externo - mesmo servidor do Jenkins)
        - name: RABBITMQ_URL
          value: "amqp://clica_sso:clic@124578++@10.132.0.10:5672"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "384Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 5
        volumeMounts:
        - name: db-ca-cert
          mountPath: /etc/ssl/certs
          readOnly: true
        - name: banco-inter-cert
          mountPath: /etc/banco-inter-cert
          readOnly: true
      volumes:
      - name: db-ca-cert
        secret:
          secretName: db-ca-cert
      - name: banco-inter-cert
        secret:
          secretName: banco-inter-cert
---
apiVersion: v1
kind: Service
metadata:
  name: clica-sso-backend-service
  namespace: default
  labels:
    app: clica-sso-backend
spec:
  selector:
    app: clica-sso-backend
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clica-sso-backend-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://accounts.clicatecnologia.com.br"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  tls:
  - hosts:
    - api.clicatecnologia.com.br
    secretName: clica-sso-backend-tls
  rules:
  - host: api.clicatecnologia.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clica-sso-backend-service
            port:
              number: 80
